apiVersion: v1
kind: Service
metadata:
  name: order-service-service
  labels:
    app: order-service
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - port: {{ .Values.orderService.service.port }}
      targetPort: {{ .Values.orderService.service.port }}
      nodePort: {{ .Values.orderService.service.nodePort }}